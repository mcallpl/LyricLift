# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name lyriclift.peoplestar.com;

    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lyriclift.peoplestar.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/lyriclift.peoplestar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lyriclift.peoplestar.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large file uploads
    client_max_body_size 100M;

    # Proxy to Flask backend (running on port 5000)
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
    }

    # Security: deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/lyriclift_access.log;
    error_log /var/log/nginx/lyriclift_error.log;
}
