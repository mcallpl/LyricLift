# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name lyriclift.peoplestar.com;

    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lyriclift.peoplestar.com;

    root /var/www/html/LyricLift;
    index index.php;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/lyriclift.peoplestar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lyriclift.peoplestar.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large file uploads
    client_max_body_size 100M;

    # PHP-FPM configuration
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 900;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 900;
    }

    # Security: deny access to tmp directory
    location ~* ^/tmp/ {
        deny all;
    }

    # Security: deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/lyriclift_access.log;
    error_log /var/log/nginx/lyriclift_error.log;
}
